                  - id: 80000000-0000-4000-8000-000000000001
                    title: Status moved to COMPLETED
                    description: "Sam Staff changed a job from IN_PROGRESS to COMPLETED. Note: Work completed successfully."
                    timestamp: "2026-03-20T03:00:00.000Z"
                    tone: success
                    targetType: job
                    targetId: 40000000-0000-4000-8000-000000000001
                meta:
                  pagination:
                    page: 1
                    pageSize: 10
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
