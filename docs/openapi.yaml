        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job evidence deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/{jobId}/assign:
    post:
      tags: [Job]
      operationId: assignJob
      summary: Assign a job to an active staff membership
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignJobRequest"
            example:
              membershipId: 50000000-0000-4000-8000-000000000001
      responses:
        "200":
          description: Job assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/{jobId}/unassign:
    post:
      tags: [Job]
      operationId: unassignJob
