<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpsFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    input, select, button, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.35); }
    table { font-size: inherit; }
    ::selection { background: rgba(124,92,252,0.2); }

    .tweaks-panel {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      width: 270px; border-radius: 14px; overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .tweaks-panel[hidden] { display: none; }
    .tweaks-head { padding: 14px 18px; font-size: 13px; font-weight: 800; letter-spacing: -0.02em; }
    .tweaks-body { padding: 10px 18px 16px; display: flex; flex-direction: column; gap: 16px; }
    .tweaks-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .tweaks-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .tweaks-chip {
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid; transition: all 0.15s;
    }
    .tweaks-chip:hover { transform: translateY(-1px); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="v2/theme.jsx"></script>
  <script type="text/babel" src="v2/shared.jsx"></script>
  <script type="text/babel" src="v2/dashboard.jsx"></script>
  <script type="text/babel" src="v2/data-pages.jsx"></script>
  <script type="text/babel" src="v2/other-pages.jsx"></script>
  <script type="text/babel" src="v2/detail-pages.jsx"></script>
  <script type="text/babel" src="v2/shell.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "scheme": "violet",
      "dark": false
    }/*EDITMODE-END*/;

    function App() {
      const [page, setPage] = React.useState('dashboard');
      return React.createElement(ThemeProvider2, null,
        React.createElement(AppInner2, { page, setPage })
      );
    }

    function AppInner2({ page, setPage }) {
      const t = useT();
      const [tweaksVisible, setTweaksVisible] = React.useState(false);

      React.useEffect(() => {
        t.setSchemeKey(TWEAK_DEFAULTS.scheme);
        t.setDark(TWEAK_DEFAULTS.dark);
      }, []);

      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      const applyTweak = (key, value) => {
        if (key === 'scheme') t.setSchemeKey(value);
        if (key === 'dark') t.setDark(value);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
      };

      return React.createElement(React.Fragment, null,
        React.createElement(V2Shell, { page, setPage }),

        React.createElement('div', {
          className: 'tweaks-panel',
          hidden: !tweaksVisible,
          style: {
            background: t.surface,
            border: `1px solid ${t.border}`,
            boxShadow: `0 16px 48px rgba(0,0,0,${t.dark ? 0.5 : 0.12})`,
          }
        },
          React.createElement('div', {
            className: 'tweaks-head',
            style: { color: t.text, borderBottom: `1px solid ${t.border}` }
          }, 'Tweaks'),
          React.createElement('div', { className: 'tweaks-body' },
            // Schemes
            React.createElement('div', null,
              React.createElement('div', { className: 'tweaks-label', style: { color: t.textMuted } }, 'Color Scheme'),
              React.createElement('div', { className: 'tweaks-row' },
                Object.entries(schemes2).map(([key, s]) =>
                  React.createElement('button', {
                    key, className: 'tweaks-chip',
                    onClick: () => applyTweak('scheme', key),
                    style: {
                      background: t.schemeKey === key ? s.primary + '15' : 'transparent',
                      borderColor: t.schemeKey === key ? s.primary : t.border,
                      color: t.schemeKey === key ? s.primary : t.textSecondary,
                    }
                  }, s.name)
                ),
              ),
            ),
            // Dark mode
            React.createElement('div', null,
              React.createElement('div', { className: 'tweaks-label', style: { color: t.textMuted } }, 'Mode'),
              React.createElement('div', { className: 'tweaks-row' },
                [{ v: false, l: 'Light' }, { v: true, l: 'Dark' }].map(({ v, l }) =>
                  React.createElement('button', {
                    key: l, className: 'tweaks-chip',
                    onClick: () => applyTweak('dark', v),
                    style: {
                      background: t.dark === v ? t.primary + '15' : 'transparent',
                      borderColor: t.dark === v ? t.primary : t.border,
                      color: t.dark === v ? t.primary : t.textSecondary,
                    }
                  }, l)
                ),
              ),
            ),
          ),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
