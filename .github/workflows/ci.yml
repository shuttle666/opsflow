name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  client-ci:
    name: client-ci
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  server-ci:
    name: server-ci
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://opsflow:opsflow@localhost:5432/opsflow?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  nginx-ingress-smoke:
    name: nginx-ingress-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify the production ingress boundary
        run: infra/nginx/smoke/run.sh

  server-db-integration:
    name: server-db-integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: opsflow_test
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsflow -d opsflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://opsflow:opsflow@localhost:5432/opsflow_test?schema=public
      RUN_DB_TESTS: "true"
      ALLOW_DB_TEST_RESET: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy

      - name: Run database integration tests
        run: pnpm test

      - name: Verify Agent request correlation without a live model
        run: pnpm exec vitest run tests/security.api.integration.test.ts
        env:
          ALLOW_FAKE_AI_PROVIDER: "true"
          AI_DISPATCH_PLANNER_PROVIDER: fake
          AI_DISPATCH_PLANNER_MODEL: opsflow-scripted-e2e-v1
          AI_INTENT_EXTRACTOR_ENABLED: "false"

  playwright-e2e:
    name: playwright-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: opsflow_e2e
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsflow -d opsflow_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://opsflow:opsflow@127.0.0.1:5432/opsflow_e2e?schema=public
      PLAYWRIGHT_DATABASE_URL: postgresql://opsflow:opsflow@127.0.0.1:5432/opsflow_e2e?schema=public
      PLAYWRIGHT_START_SERVERS: "true"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      PLAYWRIGHT_API_URL: http://127.0.0.1:4100/api
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4100/api
      EVIDENCE_DIR: ${{ github.workspace }}/client/test-results/evidence

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            client/pnpm-lock.yaml
            server/pnpm-lock.yaml

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --dir server prisma:generate

      - name: Apply database migrations
        run: pnpm --dir server prisma:migrate:deploy

      - name: Seed disposable E2E database
        run: pnpm --dir server prisma:seed
        env:
          E2E_SEED: "1"

      - name: Install Chromium
        run: pnpm --dir client exec playwright install --with-deps chromium

      - name: Build server
        run: pnpm --dir server build

      - name: Build client
        run: pnpm --dir client build

      - name: Run Playwright E2E tests
        run: pnpm --dir client test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/playwright-report/
            client/test-results/
          if-no-files-found: ignore
          retention-days: 7
