services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: opsflow-server-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN_MINUTES: ${JWT_ACCESS_EXPIRES_IN_MINUTES}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS}
      AUTH_SESSION_LIMIT: ${AUTH_SESSION_LIMIT}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      INVITATION_EXPIRES_IN_DAYS: ${INVITATION_EXPIRES_IN_DAYS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    expose:
      - "4000"
    volumes:
      - ${SERVER_UPLOADS_DIR}:/app/uploads
      - ${SERVER_CERTS_DIR}:/app/certs:ro
      - ${SERVER_CERTS_DIR}:/app/prisma/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - opsflow

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: opsflow-client-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      server:
        condition: service_started
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - opsflow

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: opsflow-nginx-prod
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      CERT_NAME: ${CERT_NAME}
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - opsflow

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - opsflow

volumes:
  letsencrypt:
  certbot_webroot:

networks:
  opsflow:
    driver: bridge
