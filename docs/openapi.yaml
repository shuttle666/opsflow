            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobEvidenceItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/{jobId}/evidence/{evidenceId}/download:
    get:
      tags: [Job]
      operationId: downloadJobEvidence
      summary: Download a previously uploaded evidence file for a visible job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPathParam"
        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
