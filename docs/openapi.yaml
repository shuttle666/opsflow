openapi: 3.1.0
info:
  title: OpsFlow API
  version: phase7-v1
  license:
    name: MIT
    identifier: MIT
  description: |
    OpenAPI specification for the currently implemented backend APIs through Phase 7.
    Scope includes health, auth, invitations, customers, jobs, team membership management, assignment flows, workflow transitions, tenant activity feed, and job evidence/document uploads.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health endpoints.
  - name: Auth
    description: Authentication and tenant context endpoints.
  - name: Tenant
    description: Tenant-scoped management endpoints.
  - name: Invitation
    description: Invitation lifecycle endpoints.
  - name: Customer
    description: Customer management endpoints.
  - name: Job
    description: Job management endpoints.
  - name: Team
    description: Team membership management endpoints.
  - name: Activity
    description: Tenant activity feed endpoints.

paths:
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Get API health status
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessHealthResponse"
              example:
                success: true
                message: OpsFlow API is healthy.
                data:
                  status: ok
                  environment: development
                  timestamp: "2026-03-20T04:00:00.000Z"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user and bootstrap a tenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: owner@acme.test
              password: password123
              displayName: Acme Owner
              tenantName: Acme Home Services
      responses:
        "201":
          description: Registration successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email/password and optional tenant context
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: owner@acme.test
              password: password123
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate refresh token and issue a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: 5932e6ce2a2c44cf8f7ea7c48e749cf760f0f6d4c06dc98d
      responses:
        "200":
          description: Token refresh successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout current session or all sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            example:
              allDevices: false
      responses:
        "200":
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user and tenant context
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/switch-tenant:
    post:
      tags: [Auth]
      operationId: switchTenant
      summary: Switch current tenant context and issue a new token pair
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantRequest"
            example:
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Tenant switched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations:
    post:
      tags: [Tenant]
      operationId: createInvitation
      summary: Create a tenant invitation (OWNER/MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
            example:
              email: new-member@acme.test
              role: STAFF
      responses:
        "201":
          description: Invitation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationCreatedResponse"
              example:
                success: true
                message: Invitation created.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                  email: new-member@acme.test
                  role: STAFF
                  expiresAt: "2026-03-28T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Tenant]
      operationId: listTenantInvitations
      summary: List invitations in current tenant (OWNER/MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationStatusQueryParam"
      responses:
        "200":
          description: Tenant invitations loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationsResponse"
              example:
                success: true
                message: Tenant invitations loaded.
                data:
                  - id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                    email: new-member@acme.test
                    role: STAFF
                    status: PENDING
                    expiresAt: "2026-03-28T12:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
                    invitedBy:
                      id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                      email: owner@acme.test
                      displayName: Acme Owner
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations/{invitationId}/resend:
    post:
      tags: [Tenant]
      operationId: resendInvitation
      summary: Resend (extend) a pending invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation resent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationMutationResponse"
              example:
                success: true
                message: Invitation resent.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  status: PENDING
                  expiresAt: "2026-03-30T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations/{invitationId}/cancel:
    post:
      tags: [Tenant]
      operationId: cancelInvitation
      summary: Cancel a pending invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationMutationResponse"
              example:
                success: true
                message: Invitation cancelled.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  status: CANCELLED
                  expiresAt: "2026-03-30T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/mine:
    get:
      tags: [Invitation]
      operationId: listMyInvitations
      summary: List pending invitations visible to current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My invitations loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMyInvitationsResponse"
              example:
                success: true
                message: My invitations loaded.
                data:
                  - id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    role: STAFF
                    status: PENDING
                    expiresAt: "2026-03-28T12:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/{invitationId}/accept:
    post:
      tags: [Invitation]
      operationId: acceptInvitationById
      summary: Accept invitation by invitation id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/accept:
    post:
      tags: [Invitation]
      operationId: acceptInvitationByToken
      summary: Accept invitation by token (fallback)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
            example:
              token: 9cc2169845f1478ea6ce088f4f8708015a31bb2f6fbfca76
      responses:
        "200":
          description: Invitation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/customers:
    get:
      tags: [Customer]
      operationId: listCustomers
      summary: List customers in the current tenant
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [createdAt_desc, createdAt_asc, name_asc, name_desc]
      responses:
        "200":
          description: Customers loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessCustomerListResponse"
              example:
                success: true
                message: Customers loaded.
                data:
                  - id: 30000000-0000-4000-8000-000000000001
                    name: Noah Thompson
                    phone: "0412 000 001"
                    email: noah.t@example.com
                    address: 12 Glenview Rd, Adelaide
                    createdAt: "2026-03-20T04:00:00.000Z"
                    updatedAt: "2026-03-20T04:00:00.000Z"
                meta:
                  pagination:
                    page: 1
                    pageSize: 10
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Customer]
      operationId: createCustomer
      summary: Create a customer in the current tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
            example:
              name: Noah Thompson
              phone: "0412 000 001"
              email: noah.t@example.com
              address: 12 Glenview Rd, Adelaide
      responses:
        "201":
          description: Customer created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessCustomerListItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/customers/{customerId}:
    get:
      tags: [Customer]
      operationId: getCustomerDetail
      summary: Get customer detail with recent job summaries
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdPathParam"
      responses:
        "200":
          description: Customer loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessCustomerDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Customer]
      operationId: updateCustomer
      summary: Update customer fields in the current tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
            example:
              name: Noah Thompson Updated
              phone: ""
              email: noah.updated@example.com
              address: 14 Glenview Rd, Adelaide
      responses:
        "200":
          description: Customer updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessCustomerListItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs:
    get:
      tags: [Job]
      operationId: listJobs
      summary: List jobs in the current tenant (OWNER/MANAGER)
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: customerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: scheduledFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: scheduledTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [createdAt_desc, createdAt_asc, scheduledAt_asc, scheduledAt_desc]
      responses:
        "200":
          description: Jobs loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobListResponse"
              example:
                success: true
                message: Jobs loaded.
                data:
                  - id: 40000000-0000-4000-8000-000000000001
                    title: Leaking kitchen tap
                    status: NEW
                    scheduledAt: "2026-03-30T02:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
                    updatedAt: "2026-03-20T04:00:00.000Z"
                    customer:
                      id: 30000000-0000-4000-8000-000000000001
                      name: Noah Thompson
                meta:
                  pagination:
                    page: 1
                    pageSize: 10
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Job]
      operationId: createJob
      summary: Create a job in the current tenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
            example:
              customerId: 30000000-0000-4000-8000-000000000001
              title: Leaking kitchen tap
              description: Tap leaking overnight.
              scheduledAt: "2026-03-30T02:00:00.000Z"
      responses:
        "201":
          description: Job created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobListItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/my:
    get:
      tags: [Job]
      operationId: listMyJobs
      summary: List jobs assigned to the current user
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: scheduledFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: scheduledTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [createdAt_desc, createdAt_asc, scheduledAt_asc, scheduledAt_desc]
      responses:
        "200":
          description: Assigned jobs loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobListResponse"
              example:
                success: true
                message: Assigned jobs loaded.
                data:
                  - id: 40000000-0000-4000-8000-000000000001
                    title: Assigned maintenance visit
                    status: SCHEDULED
                    scheduledAt: "2026-03-30T02:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
                    updatedAt: "2026-03-20T05:00:00.000Z"
                    customer:
                      id: 30000000-0000-4000-8000-000000000001
                      name: Noah Thompson
                    assignedToName: Sam Staff
                meta:
                  pagination:
                    page: 1
                    pageSize: 10
                    total: 1
                    totalPages: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/{jobId}:
    get:
      tags: [Job]
      operationId: getJobDetail
      summary: Get job detail for the current tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPathParam"
      responses:
        "200":
          description: Job loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Job]
      operationId: updateJob
      summary: Update allowed job fields in the current tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequest"
            example:
              customerId: 30000000-0000-4000-8000-000000000001
              title: Leaking kitchen tap updated
              description: ""
              scheduledAt: ""
      responses:
        "200":
          description: Job updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessJobListItemResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/jobs/{jobId}/history:
    get:
      tags: [Job]
      operationId: getJobHistory
      summary: Get workflow history and allowed next transitions for a job
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPathParam"
      responses:
        "200":
          description: Job history loaded.
