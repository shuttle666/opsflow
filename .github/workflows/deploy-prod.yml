name: Deploy Production

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    environment: production
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          : "${DEPLOY_SHA:?DEPLOY_SHA is required}"
          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_USER:?EC2_USER secret is required}"
          : "${EC2_SSH_KEY:?EC2_SSH_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${API_HEALTH_URL:?API_HEALTH_URL secret is required}"

          if [ -z "${EC2_PORT:-}" ]; then
            echo "EC2_PORT is not set; defaulting to 22."
            echo "EC2_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Checkout deployment scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/opsflow_deploy_key
          chmod 600 ~/.ssh/opsflow_deploy_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment script
        run: |
          set -euo pipefail
          scp \
            -i ~/.ssh/opsflow_deploy_key \
            -P "$EC2_PORT" \
            deploy/scripts/deploy-prod.sh \
            "$EC2_USER@$EC2_HOST:/tmp/opsflow-deploy-prod.sh"

      - name: Deploy to EC2
        run: |
          set -euo pipefail
          remote_env="$(printf "DEPLOY_PATH=%q DEPLOY_SHA=%q API_HEALTH_URL=%q APP_URL=%q" "$DEPLOY_PATH" "$DEPLOY_SHA" "$API_HEALTH_URL" "${APP_URL:-}")"

          ssh \
            -i ~/.ssh/opsflow_deploy_key \
            -p "$EC2_PORT" \
            "$EC2_USER@$EC2_HOST" \
            "$remote_env bash /tmp/opsflow-deploy-prod.sh"
