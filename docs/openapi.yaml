openapi: 3.1.0
info:
  title: OpsFlow API
  version: phase2-v2
  license:
    name: MIT
    identifier: MIT
  description: |
    OpenAPI specification for currently implemented Phase 2 backend APIs.
    Scope includes health, auth, tenant invitation management, and invitation acceptance.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health endpoints.
  - name: Auth
    description: Authentication and tenant context endpoints.
  - name: Tenant
    description: Tenant-scoped management endpoints.
  - name: Invitation
    description: Invitation lifecycle endpoints.

paths:
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Get API health status
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessHealthResponse"
              example:
                success: true
                message: OpsFlow API is healthy.
                data:
                  status: ok
                  environment: development
                  timestamp: "2026-03-20T04:00:00.000Z"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user and bootstrap a tenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: owner@acme.test
              password: password123
              displayName: Acme Owner
              tenantName: Acme Home Services
      responses:
        "201":
          description: Registration successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email/password and optional tenant context
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: owner@acme.test
              password: password123
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate refresh token and issue a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: 5932e6ce2a2c44cf8f7ea7c48e749cf760f0f6d4c06dc98d
      responses:
        "200":
          description: Token refresh successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout current session or all sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            example:
              allDevices: false
      responses:
        "200":
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user and tenant context
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/switch-tenant:
    post:
      tags: [Auth]
      operationId: switchTenant
      summary: Switch current tenant context and issue a new token pair
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantRequest"
            example:
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Tenant switched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations:
    post:
      tags: [Tenant]
      operationId: createInvitation
      summary: Create a tenant invitation (OWNER/MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
            example:
              email: new-member@acme.test
              role: STAFF
      responses:
        "201":
          description: Invitation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationCreatedResponse"
              example:
                success: true
                message: Invitation created.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                  email: new-member@acme.test
                  role: STAFF
                  expiresAt: "2026-03-28T12:00:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Tenant]
      operationId: listTenantInvitations
      summary: List invitations in current tenant (OWNER/MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationStatusQueryParam"
      responses:
        "200":
          description: Tenant invitations loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationsResponse"
              example:
                success: true
                message: Tenant invitations loaded.
                data:
                  - id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                    email: new-member@acme.test
                    role: STAFF
                    status: PENDING
                    expiresAt: "2026-03-28T12:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
                    invitedBy:
                      id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                      email: owner@acme.test
                      displayName: Acme Owner
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations/{invitationId}/resend:
    post:
      tags: [Tenant]
      operationId: resendInvitation
      summary: Resend (extend) a pending invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation resent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationMutationResponse"
              example:
                success: true
                message: Invitation resent.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  status: PENDING
                  expiresAt: "2026-03-30T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations/{invitationId}/cancel:
    post:
      tags: [Tenant]
      operationId: cancelInvitation
      summary: Cancel a pending invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessTenantInvitationMutationResponse"
              example:
                success: true
                message: Invitation cancelled.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  status: CANCELLED
                  expiresAt: "2026-03-30T12:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/mine:
    get:
      tags: [Invitation]
      operationId: listMyInvitations
      summary: List pending invitations visible to current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My invitations loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMyInvitationsResponse"
              example:
                success: true
                message: My invitations loaded.
                data:
                  - id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    role: STAFF
                    status: PENDING
                    expiresAt: "2026-03-28T12:00:00.000Z"
                    createdAt: "2026-03-20T04:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/{invitationId}/accept:
    post:
      tags: [Invitation]
      operationId: acceptInvitationById
      summary: Accept invitation by invitation id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/InvitationIdPathParam"
      responses:
        "200":
          description: Invitation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/accept:
    post:
      tags: [Invitation]
      operationId: acceptInvitationByToken
      summary: Accept invitation by token (fallback)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
            example:
              token: 9cc2169845f1478ea6ce088f4f8708015a31bb2f6fbfca76
      responses:
        "200":
          description: Invitation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdPathParam:
      name: tenantId
      in: path
      required: true
      description: Tenant UUID.
      schema:
        type: string
        format: uuid
    InvitationIdPathParam:
      name: invitationId
      in: path
      required: true
      description: Invitation UUID.
      schema:
        type: string
        format: uuid
    InvitationStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/InvitationStatus"

  responses:
    BadRequest:
      description: Validation failed or request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Validation failed
            details:
              formErrors: []
              fieldErrors:
                email:
                  - Invalid email address
    Unauthorized:
      description: Authentication failed or token is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Authentication is required.
            details:
              code: SESSION_REVOKED
    Forbidden:
      description: Authenticated but not allowed for this action or tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Insufficient role for this operation.
            details:
              code: FORBIDDEN_ROLE
              requiredRoles:
                - OWNER
                - MANAGER
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation not found.
            details:
              code: INVITATION_NOT_FOUND
    Conflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation is no longer pending.
            details:
              code: INVITATION_ALREADY_USED
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Internal server error

  schemas:
    MembershipRole:
      type: string
      enum: [OWNER, MANAGER, STAFF]

    InvitationStatus:
      type: string
      enum: [PENDING, ACCEPTED, CANCELLED, EXPIRED]

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 1
        tenantName:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        tenantId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20

    LogoutRequest:
      type: object
      properties:
        allDevices:
          type: boolean
          default: false

    SwitchTenantRequest:
      type: object
      required: [tenantId]
      properties:
        tenantId:
          type: string
          format: uuid

    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 20

    UserSummary:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string

    TenantMembership:
      type: object
      required: [tenantId, tenantName, tenantSlug, role]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantSlug:
          type: string
        role:
          $ref: "#/components/schemas/MembershipRole"

    AuthResult:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresInMinutes
        - user
        - currentTenant
        - availableTenants
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInMinutes:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    MeResult:
      type: object
      required: [user, currentTenant, availableTenants]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    InvitationCreatedResult:
      type: object
      required: [id, tenantId, email, role, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]
        expiresAt:
          type: string
          format: date-time

    InvitationAcceptedResult:
      type: object
      required: [tenantId, role]
      properties:
        tenantId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/MembershipRole"

    MyInvitationItem:
      type: object
      required: [id, tenantId, tenantName, role, status, expiresAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    TenantInvitationItem:
      type: object
      required:
        - id
        - email
        - role
        - status
        - expiresAt
        - createdAt
        - invitedBy
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        invitedBy:
          $ref: "#/components/schemas/UserSummary"

    TenantInvitationMutationResult:
      type: object
      required: [id, status, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time

    HealthData:
      type: object
      required: [status, environment, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        environment:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiSuccessMessageResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        meta:
          type: object
          additionalProperties: true

    ApiSuccessHealthResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/HealthData"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessAuthResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/AuthResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessMeResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/MeResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessInvitationCreatedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/InvitationCreatedResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessInvitationAcceptedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/InvitationAcceptedResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessMyInvitationsResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/MyInvitationItem"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessTenantInvitationsResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/TenantInvitationItem"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessTenantInvitationMutationResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/TenantInvitationMutationResult"
        meta:
          type: object
          additionalProperties: true

    ApiErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
