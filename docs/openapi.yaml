openapi: 3.1.0
info:
  title: OpsFlow API
  version: phase2-v1
  license:
    name: MIT
    identifier: MIT
  description: |
    OpenAPI specification for currently implemented Phase 2 backend APIs.
    Scope includes health, auth, tenant invitation creation, and invitation acceptance.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health endpoints.
  - name: Auth
    description: Authentication and tenant context endpoints.
  - name: Tenant
    description: Tenant-scoped management endpoints.
  - name: Invitation
    description: Invitation lifecycle endpoints.
paths:
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Get API health status
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessHealthResponse"
              example:
                success: true
                message: OpsFlow API is healthy.
                data:
                  status: ok
                  environment: development
                  timestamp: "2026-03-19T08:30:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user and bootstrap a tenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: owner@acme.test
              password: password123
              displayName: Acme Owner
              tenantName: Acme Home Services
      responses:
        "201":
          description: Registration successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
              example:
                success: true
                message: Registration successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: 267f078dbf2f4fd4af952f0f08be166786c92b6ba4185f72
                  expiresInMinutes: 15
                  user:
                    id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                    email: owner@acme.test
                    displayName: Acme Owner
                  currentTenant:
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    tenantSlug: acme-home-services
                    role: OWNER
                  availableTenants:
                    - tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                      tenantName: Acme Home Services
                      tenantSlug: acme-home-services
                      role: OWNER
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email/password and optional tenant context
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: owner@acme.test
              password: password123
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
              example:
                success: true
                message: Login successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
                  refreshToken: 5932e6ce2a2c44cf8f7ea7c48e749cf760f0f6d4c06dc98d
                  expiresInMinutes: 15
                  user:
                    id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                    email: owner@acme.test
                    displayName: Acme Owner
                  currentTenant:
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    tenantSlug: acme-home-services
                    role: OWNER
                  availableTenants:
                    - tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                      tenantName: Acme Home Services
                      tenantSlug: acme-home-services
                      role: OWNER
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Rotate refresh token and issue a new token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: 5932e6ce2a2c44cf8f7ea7c48e749cf760f0f6d4c06dc98d
      responses:
        "200":
          description: Token refresh successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
              example:
                success: true
                message: Token refresh successful.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refreshed
                  refreshToken: 0cb9170f936248a8a1f0f5f4137f9aeb1d06f6a5eb2ff4d0
                  expiresInMinutes: 15
                  user:
                    id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                    email: owner@acme.test
                    displayName: Acme Owner
                  currentTenant:
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    tenantSlug: acme-home-services
                    role: OWNER
                  availableTenants:
                    - tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                      tenantName: Acme Home Services
                      tenantSlug: acme-home-services
                      role: OWNER
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout current session or all sessions
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            example:
              allDevices: false
      responses:
        "200":
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMessageResponse"
              example:
                success: true
                message: Logout successful.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current user and tenant context
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMeResponse"
              example:
                success: true
                message: Current user loaded.
                data:
                  user:
                    id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                    email: owner@acme.test
                    displayName: Acme Owner
                  currentTenant:
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    tenantSlug: acme-home-services
                    role: OWNER
                  availableTenants:
                    - tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                      tenantName: Acme Home Services
                      tenantSlug: acme-home-services
                      role: OWNER
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/switch-tenant:
    post:
      tags: [Auth]
      operationId: switchTenant
      summary: Switch current tenant context and issue a new token pair
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantRequest"
            example:
              tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
      responses:
        "200":
          description: Tenant switched successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessAuthResponse"
              example:
                success: true
                message: Tenant switched successfully.
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.switched
                  refreshToken: 2286097f0e3b4f8bbf89f9be2f4f4d33d0c4a0b8be03ff35
                  expiresInMinutes: 15
                  user:
                    id: 2c9613f8-bf4d-444e-bd49-27c2b0f5f1be
                    email: owner@acme.test
                    displayName: Acme Owner
                  currentTenant:
                    tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                    tenantName: Acme Home Services
                    tenantSlug: acme-home-services
                    role: OWNER
                  availableTenants:
                    - tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                      tenantName: Acme Home Services
                      tenantSlug: acme-home-services
                      role: OWNER
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/tenants/{tenantId}/invitations:
    post:
      tags: [Tenant]
      operationId: createInvitation
      summary: Create a tenant invitation (OWNER/MANAGER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
            example:
              email: new-member@acme.test
              role: STAFF
      responses:
        "201":
          description: Invitation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationCreatedResponse"
              example:
                success: true
                message: Invitation created.
                data:
                  id: 525f53d4-c563-49f7-be7b-a638f3f9d88b
                  tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                  email: new-member@acme.test
                  role: STAFF
                  expiresAt: "2026-03-26T00:00:00.000Z"
                  token: 9cc2169845f1478ea6ce088f4f8708015a31bb2f6fbfca76
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/invitations/accept:
    post:
      tags: [Invitation]
      operationId: acceptInvitation
      summary: Accept an invitation for the signed-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
            example:
              token: 9cc2169845f1478ea6ce088f4f8708015a31bb2f6fbfca76
      responses:
        "200":
          description: Invitation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessInvitationAcceptedResponse"
              example:
                success: true
                message: Invitation accepted.
                data:
                  tenantId: 2a8eb353-a5ec-4ab7-a07f-2a39b95d8938
                  role: STAFF
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdPathParam:
      name: tenantId
      in: path
      required: true
      description: Tenant UUID.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation failed or request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Validation failed
            details:
              formErrors: []
              fieldErrors:
                email:
                  - Invalid email address
    Unauthorized:
      description: Authentication failed or token is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Authentication is required.
            details:
              code: SESSION_REVOKED
    Forbidden:
      description: Authenticated but not allowed for this action or tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Insufficient role for this operation.
            details:
              code: FORBIDDEN_ROLE
              requiredRoles:
                - OWNER
                - MANAGER
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation not found.
            details:
              code: INVITATION_NOT_FOUND
    Conflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation is no longer pending.
            details:
              code: INVITATION_ALREADY_USED
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Internal server error

  schemas:
    MembershipRole:
      type: string
      enum: [OWNER, MANAGER, STAFF]

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 1
        tenantName:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        tenantId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20

    LogoutRequest:
      type: object
      properties:
        allDevices:
          type: boolean
          default: false

    SwitchTenantRequest:
      type: object
      required: [tenantId]
      properties:
        tenantId:
          type: string
          format: uuid

    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 20

    UserSummary:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string

    TenantMembership:
      type: object
      required: [tenantId, tenantName, tenantSlug, role]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantSlug:
          type: string
        role:
          $ref: "#/components/schemas/MembershipRole"

    AuthResult:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresInMinutes
        - user
        - currentTenant
        - availableTenants
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInMinutes:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    MeResult:
      type: object
      required: [user, currentTenant, availableTenants]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    InvitationCreatedResult:
      type: object
      required: [id, tenantId, email, role, expiresAt, token]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]
        expiresAt:
          type: string
          format: date-time
        token:
          type: string

    InvitationAcceptedResult:
      type: object
      required: [tenantId, role]
      properties:
        tenantId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/MembershipRole"

    HealthData:
      type: object
      required: [status, environment, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        environment:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiSuccessMessageResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        meta:
          type: object
          additionalProperties: true

    ApiSuccessHealthResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/HealthData"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessAuthResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/AuthResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessMeResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/MeResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessInvitationCreatedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/InvitationCreatedResult"
        meta:
          type: object
          additionalProperties: true

    ApiSuccessInvitationAcceptedResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/InvitationAcceptedResult"
        meta:
          type: object
          additionalProperties: true

    ApiErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
