                    - id: 70000000-0000-4000-8000-000000000001
                      fromStatus: NEW
                      toStatus: SCHEDULED
                      reason: Scheduled for next-day visit.
                      changedAt: "2026-03-20T01:00:00.000Z"
                      changedBy:
                        id: 20000000-0000-4000-8000-000000000002
                        email: manager@acme.example
