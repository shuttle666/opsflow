      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MembershipStatus"
        - name: role
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MembershipRole"
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Memberships loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMembershipListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/memberships/{membershipId}:
    patch:
      tags: [Team]
      operationId: updateMembership
      summary: Update membership role or status (OWNER only)
      security:
        - bearerAuth: []
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMembershipRequest"
            example:
              role: MANAGER
      responses:
        "200":
          description: Membership updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessMembershipResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdPathParam:
      name: tenantId
      in: path
      required: true
      description: Tenant UUID.
      schema:
        type: string
        format: uuid
    InvitationIdPathParam:
      name: invitationId
      in: path
      required: true
      description: Invitation UUID.
      schema:
        type: string
        format: uuid
    CustomerIdPathParam:
      name: customerId
      in: path
      required: true
      description: Customer UUID.
      schema:
        type: string
        format: uuid
    JobIdPathParam:
      name: jobId
      in: path
      required: true
      description: Job UUID.
      schema:
        type: string
        format: uuid
    InvitationStatusQueryParam:
      name: status
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/InvitationStatus"

  responses:
    BadRequest:
      description: Validation failed or request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Validation failed
            details:
              formErrors: []
              fieldErrors:
                email:
                  - Invalid email address
    Unauthorized:
      description: Authentication failed or token is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Authentication is required.
            details:
              code: SESSION_REVOKED
    Forbidden:
      description: Authenticated but not allowed for this action or tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Insufficient role for this operation.
            details:
              code: FORBIDDEN_ROLE
              requiredRoles:
                - OWNER
                - MANAGER
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation not found.
            details:
              code: INVITATION_NOT_FOUND
    Conflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Invitation is no longer pending.
            details:
              code: INVITATION_ALREADY_USED
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Internal server error

  schemas:
    MembershipRole:
      type: string
      enum: [OWNER, MANAGER, STAFF]

    MembershipStatus:
      type: string
      enum: [ACTIVE, INVITED, DISABLED]

    InvitationStatus:
      type: string
      enum: [PENDING, ACCEPTED, CANCELLED, EXPIRED]

    JobStatus:
      type: string
      enum: [NEW, SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 1
        tenantName:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        tenantId:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20

    LogoutRequest:
      type: object
      properties:
        allDevices:
          type: boolean
          default: false

    SwitchTenantRequest:
      type: object
      required: [tenantId]
      properties:
        tenantId:
          type: string
          format: uuid

    CreateInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]

    AcceptInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 20

    CreateCustomerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string

    UpdateCustomerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string

    CreateJobRequest:
      type: object
      required: [customerId, title]
      properties:
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        scheduledAt:
          type: string
          format: date-time

    UpdateJobRequest:
      type: object
      required: [customerId, title]
      properties:
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        scheduledAt:
          type: string
          format: date-time

    AssignJobRequest:
      type: object
      required: [membershipId]
      properties:
        membershipId:
          type: string
          format: uuid

    JobStatusTransitionRequest:
      type: object
      required: [toStatus]
      properties:
        toStatus:
          $ref: "#/components/schemas/JobStatus"
        reason:
          type: string

    UploadJobEvidenceRequest:
      type: object
      required: [kind, file]
      properties:
        kind:
          $ref: "#/components/schemas/JobEvidenceKind"
        note:
          type: string
          maxLength: 300
        file:
          type: string
          format: binary

    UpdateMembershipRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          type: string
          enum: [ACTIVE, DISABLED]

    MembershipListItem:
      type: object
      required: [id, userId, displayName, email, role, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          $ref: "#/components/schemas/MembershipStatus"
        createdAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      required: [id, email, displayName]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string

    TenantMembership:
      type: object
      required: [tenantId, tenantName, tenantSlug, role]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        tenantSlug:
          type: string
        role:
          $ref: "#/components/schemas/MembershipRole"

    AuthResult:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresInMinutes
        - user
        - currentTenant
        - availableTenants
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresInMinutes:
          type: integer
          minimum: 1
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    MeResult:
      type: object
      required: [user, currentTenant, availableTenants]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        currentTenant:
          $ref: "#/components/schemas/TenantMembership"
        availableTenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"

    InvitationCreatedResult:
      type: object
      required: [id, tenantId, email, role, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [MANAGER, STAFF]
        expiresAt:
          type: string
          format: date-time

    InvitationAcceptedResult:
      type: object
      required: [tenantId, role]
      properties:
        tenantId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/MembershipRole"

    MyInvitationItem:
      type: object
      required: [id, tenantId, tenantName, role, status, expiresAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    TenantInvitationItem:
      type: object
      required:
        - id
        - email
        - role
        - status
        - expiresAt
        - createdAt
        - invitedBy
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/MembershipRole"
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        invitedBy:
          $ref: "#/components/schemas/UserSummary"

    TenantInvitationMutationResult:
      type: object
      required: [id, status, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time

    CustomerListItem:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerJobSummary:
      type: object
      required: [id, title, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        assignedToName:
          type: string

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/CustomerListItem"
        - type: object
          required: [createdBy, jobs]
          properties:
            createdBy:
              $ref: "#/components/schemas/UserSummary"
            jobs:
              type: array
              items:
                $ref: "#/components/schemas/CustomerJobSummary"

    JobCustomerListSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    JobCustomerDetailSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    JobListItem:
      type: object
      required: [id, title, status, createdAt, updatedAt, customer]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        customer:
          $ref: "#/components/schemas/JobCustomerListSummary"
        assignedToName:
          type: string

    JobDetail:
      type: object
      required:
        - id
        - title
        - status
        - createdAt
        - updatedAt
        - customer
        - createdBy
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/JobStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        customer:
          $ref: "#/components/schemas/JobCustomerDetailSummary"
        createdBy:
          $ref: "#/components/schemas/UserSummary"
        assignedTo:
          $ref: "#/components/schemas/UserSummary"

    JobHistoryItem:
      type: object
      required: [id, fromStatus, toStatus, changedAt]
      properties:
        id:
          type: string
          format: uuid
        fromStatus:
          $ref: "#/components/schemas/JobStatus"
        toStatus:
          $ref: "#/components/schemas/JobStatus"
        reason:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
        changedBy:
          $ref: "#/components/schemas/UserSummary"

    JobHistoryResult:
      type: object
      required: [history, allowedTransitions]
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/JobHistoryItem"
        allowedTransitions:
          type: array
          items:
            $ref: "#/components/schemas/JobStatus"

    JobStatusTransitionResult:
      type: object
      required: [job, historyEntry, allowedTransitions]
      properties:
        job:
          $ref: "#/components/schemas/JobDetail"
        historyEntry:
          $ref: "#/components/schemas/JobHistoryItem"
        allowedTransitions:
          type: array
          items:
            $ref: "#/components/schemas/JobStatus"

    JobEvidenceKind:
      type: string
      enum: [SITE_PHOTO, COMPLETION_PROOF, CUSTOMER_DOCUMENT, ISSUE_EVIDENCE]

    JobEvidenceItem:
      type: object
      required:
        - id
        - kind
        - fileName
        - mimeType
        - sizeBytes
        - createdAt
        - downloadPath
        - uploadedBy
      properties:
